<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Admin Dashboard | East Coast Estates</title>

    <!-- Remix Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css"
      rel="stylesheet"
    />

    <!-- Admin CSS -->
    <link rel="stylesheet" href="css/admin.css" />
  </head>
  <body>
    <!--==================== HEADER ====================-->

    <header class="admin-header">
      <div class="container">
        <div class="admin-header-top">
          <div>
            <h1>Review Management</h1>

            <p>
              Manage customer testimonials before they appear on the website.
            </p>
          </div>

          <div class="admin-user">
            <i class="ri-user-3-line"></i>
            <span id="adminUsername"></span>
          </div>

          <button id="logoutBtn" class="logout-btn">
            <i class="ri-logout-box-r-line"></i>

            Logout
          </button>
        </div>
      </div>
    </header>

    <!--==================== MAIN ====================-->

    <main class="container">
      <!-- Dashboard Stats -->

      <section class="stats">
        <div class="stat-card">
          <h2 id="pending-count">0</h2>

          <p>Pending Reviews</p>
        </div>

        <div class="stat-card">
          <h2 id="approved-count">0</h2>

          <p>Approved Reviews</p>
        </div>
      </section>

      <!--==================== REVIEW TABS ====================-->

      <section class="review-tabs">
        <button class="tab-btn active" id="pending-tab" data-tab="pending">
          <i class="ri-time-line"></i>

          Pending Reviews
        </button>

        <button class="tab-btn" id="approved-tab" data-tab="approved">
          <i class="ri-checkbox-circle-line"></i>

          Approved Reviews
        </button>
      </section>

      <!-- Loading -->

      <div id="loading" class="loading-message">Loading reviews...</div>

      <!-- Empty State -->

      <div id="empty-state" class="empty-state" style="display: none">
        <i class="ri-chat-smile-3-line"></i>

        <h3>No Pending Reviews</h3>

        <p>New customer reviews will appear here for approval.</p>
      </div>

      <!-- Review List -->

      <section id="review-list" class="review-list">
        <!-- Reviews will be inserted here -->
      </section>
    </main>

    <!--==================== REVIEW MODAL ====================-->

    <div class="review-modal" id="reviewModal">
      <div class="review-modal-content">
        <button class="close-modal" id="closeModal">&times;</button>

        <div id="modal-content"></div>
      </div>
    </div>

    <!--=========================================
CONFIRM MODAL
==========================================-->

    <div class="confirm-modal" id="confirmModal">
      <div class="confirm-box">
        <div class="confirm-icon">
          <i class="ri-error-warning-fill"></i>
        </div>

        <h2 id="confirmTitle">Confirm Action</h2>

        <p id="confirmMessage">Are you sure?</p>

        <div class="confirm-actions">
          <button id="confirmCancel" class="cancel-btn">Cancel</button>

          <button id="confirmOk" class="confirm-btn">Confirm</button>
        </div>
      </div>
    </div>

    <!--==================== TOAST CONTAINER ====================-->
    <div id="toast-container"></div>

    <!--==================== SCRIPT ====================-->
    <script src="js/admin.js"></script>
  </body>
</html>
